<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rule of 3rd Mvmt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e2c27a;
      --dark: #080808;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      overflow: hidden;
    }

    #intro::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)' opacity='0.06'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      animation: grainShift 0.09s steps(1) infinite;
      z-index: 0;
    }

    @keyframes grainShift {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-1px,1px); }
      50%  { transform: translate(1px,-1px); }
      75%  { transform: translate(-2px,1px); }
      100% { transform: translate(1px,-2px); }
    }

    #intro::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 30%, rgba(0,0,0,0.9) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #intro {
      position: fixed;
      inset: 0;
      background: var(--dark);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
    }

    .letterbox-top, .letterbox-bottom {
      position: absolute;
      left: 0; right: 0;
      height: 0;
      background: #000;
      z-index: 5;
      transition: height 0.7s cubic-bezier(0.76, 0, 0.24, 1);
    }
    .letterbox-top { top: 0; }
    .letterbox-bottom { bottom: 0; }
    #intro.letterbox .letterbox-top,
    #intro.letterbox .letterbox-bottom { height: 9vh; }

    .stage {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* RING + LOGO */
    .ring-logo-wrap {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scale(0.82) rotate(-15deg);
      transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }

    #intro.ring-visible #ring-svg {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    #intro.ring-spinning #ring-svg {
      animation: spinRing 14s linear infinite;
    }

    @keyframes spinRing {
      from { transform: scale(1) rotate(0deg); }
      to   { transform: scale(1) rotate(360deg); }
    }

    #ring-circle-path {
      stroke: var(--gold);
      stroke-width: 0.6;
      fill: none;
      opacity: 0;
    }

    #intro.ring-visible #ring-circle-path {
      animation: ringGlowPulse 2.2s ease-in-out infinite;
      opacity: 1;
    }

    @keyframes ringGlowPulse {
      0%   { opacity: 0.35; filter: drop-shadow(0 0 3px rgba(201,168,76,0.4)); }
      50%  { opacity: 1;    filter: drop-shadow(0 0 12px rgba(201,168,76,1)) drop-shadow(0 0 25px rgba(201,168,76,0.5)); }
      100% { opacity: 0.35; filter: drop-shadow(0 0 3px rgba(201,168,76,0.4)); }
    }

    #ring-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      fill: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
      filter: drop-shadow(0 0 4px rgba(201,168,76,0.7));
    }

    #intro.ring-visible #ring-text { opacity: 1; }

    #intro.ring-dissolve #ring-svg {
      opacity: 0;
      transform: scale(1.18) rotate(25deg);
      transition: opacity 1s ease, transform 1s ease;
      animation: none !important;
    }

    #intro.ring-dissolve #ring-circle-path {
      animation: none !important;
    }

    .ambient-glow {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.13) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    #intro.logo-visible .ambient-glow { opacity: 1; }

    .logo-wrap {
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 1s ease, transform 1.2s cubic-bezier(0.16,1,0.3,1);
    }

    #intro.logo-visible .logo-wrap {
      opacity: 1;
      transform: scale(1);
    }

    .logo-wrap img {
      width: min(165px, 44vw);
      height: auto;
      display: block;
    }

    .under-line {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-top: 0.4rem;
      margin-bottom: 1.6rem;
      opacity: 0;
      transition: width 1.1s cubic-bezier(0.76,0,0.24,1), opacity 0.5s ease;
    }

    #intro.line-visible .under-line {
      width: min(300px, 68vw);
      opacity: 1;
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      margin-bottom: 1.8rem;
    }

    #intro.brand-visible .brand {
      opacity: 1;
      transform: translateY(0);
    }

    .tagline-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
    }

    .tagline-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4.2vw, 2.1rem);
      letter-spacing: 0.14em;
      color: #ddd8ce;
      display: flex;
      overflow: hidden;
      line-height: 1.1;
    }

    .tagline-question {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 3.8vw, 1.95rem);
      font-weight: 200;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--gold-light);
      display: flex;
      overflow: hidden;
      margin-top: 0.2rem;
    }

    .tagline-main span,
    .tagline-question span {
      display: inline-block;
      opacity: 0;
      transform: translateY(110%);
      transition: opacity 0.35s ease, transform 0.45s cubic-bezier(0.16,1,0.3,1);
    }

    .skip {
      position: absolute;
      bottom: 12vh;
      right: 2.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.35);
      z-index: 6;
      opacity: 0;
      transition: opacity 0.5s ease;
      cursor: pointer;
      user-select: none;
    }
    #intro.skip-visible .skip { opacity: 1; }
    .skip:hover { color: var(--gold); }

    #intro.fade-out {
      opacity: 0;
      transition: opacity 1s cubic-bezier(0.76,0,0.24,1);
      pointer-events: none;
    }

    #site-content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      background: #080808;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1s ease 0.4s;
    }
    #site-content.visible { opacity: 1; }

    .site-placeholder {
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.2);
      text-align: center;
    }

    .replay {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: #080808;
      background: var(--gold);
      border: none;
      padding: 0.7rem 2rem;
      cursor: pointer;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease 0.8s;
      white-space: nowrap;
    }
    .replay.visible { opacity: 1; }
    .replay:hover { background: var(--gold-light); }
  </style>
</head>

      <div class="under-line"></div>
      <div class="brand">Rule of 3rd Mvmt</div>

      <div class="tagline-wrap">
        <div class="tagline-main" id="tag-line1"></div>
        <div class="tagline-main" id="tag-line2"></div>
        <div class="tagline-question" id="tag-line3"></div>
      </div>

    </div>

    <div class="skip" onclick="dismissIntro()">Skip &rarr;</div>
  </div>

  <div id="site-content">
    <div class="site-placeholder">ruleof3rdmvmt.com &nbsp;&middot;&nbsp; Your site loads here</div>
  </div>

  <button class="replay" id="replay-btn" onclick="replayIntro()">Replay Intro</button>

  <script>
    const intro     = document.getElementById('intro');
    const site      = document.getElementById('site-content');
    const replayBtn = document.getElementById('replay-btn');
    const logoImg   = document.getElementById('logo-img');

    const lines = [
      { id: 'tag-line1', text: 'Some moments get forgotten.' },
      { id: 'tag-line2', text: 'Others get produced.' },
      { id: 'tag-line3', text: 'Which one are you?' },
    ];

    logoImg.onerror = function() {
      this.style.display = 'none';
      const fallback = document.createElement('div');
      fallback.style.cssText = `
        font-family:'Bebas Neue',sans-serif;
        font-size:3.2rem;
        letter-spacing:0.12em;
        color:#e2c27a;
        text-shadow:0 0 40px rgba(201,168,76,0.4);
        line-height:1.1;
        text-align:center;
      `;
      fallback.innerHTML = 'Daily<br>Grind';
      this.parentNode.appendChild(fallback);
    };

    function buildLetters() {
      lines.forEach(({ id, text }) => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        text.split('').forEach(char => {
          const s = document.createElement('span');
          s.textContent = char === ' ' ? '\u00A0' : char;
          el.appendChild(s);
        });
      });
    }

    function revealLine(id, startDelay) {
      document.getElementById(id).querySelectorAll('span').forEach((s, i) => {
        setTimeout(() => {
          s.style.opacity = '1';
          s.style.transform = 'translateY(0)';
        }, startDelay + i * 40);
      });
    }

    function playIntro() {
      buildLetters();

      setTimeout(() => intro.classList.add('letterbox'),      200);
      setTimeout(() => intro.classList.add('logo-visible'),   700);
      setTimeout(() => {
        intro.classList.add('ring-visible');
        intro.classList.add('ring-spinning');
      }, 1200);

      setTimeout(() => {
        intro.classList.remove('ring-spinning');
        intro.classList.add('ring-dissolve');
        setTimeout(() => intro.classList.add('line-visible'), 500);
      }, 4000);

      setTimeout(() => intro.classList.add('brand-visible'),  4900);
      setTimeout(() => revealLine('tag-line1', 0),            5400);
      setTimeout(() => revealLine('tag-line2', 0),            6150);
      setTimeout(() => revealLine('tag-line3', 0),            6950);
      setTimeout(() => intro.classList.add('skip-visible'),   3000);
      setTimeout(() => dismissIntro(),                        9200);
    }

    function dismissIntro() {
      intro.classList.add('fade-out');
      site.classList.add('visible');
      setTimeout(() => {
        intro.style.display = 'none';
        replayBtn.classList.add('visible');
        // PRODUCTION: uncomment to redirect
        // window.location.href = 'https://ruleof3rdmvmt.com';
      }, 1100);
    }

    function replayIntro() {
      intro.style.display = 'flex';
      intro.style.opacity = '1';
      intro.classList.remove(
        'fade-out','letterbox','logo-visible','ring-visible',
        'ring-spinning','ring-dissolve','line-visible',
        'brand-visible','skip-visible'
      );
      site.classList.remove('visible');
      replayBtn.classList.remove('visible');
      lines.forEach(({ id }) => {
        document.getElementById(id).querySelectorAll('span').forEach(s => {
          s.style.opacity = '0';
          s.style.transform = 'translateY(110%)';
        });
      });
      setTimeout(() => playIntro(), 300);
    }

    intro.addEventListener('click', function(e) {
      if (!e.target.classList.contains('skip')) dismissIntro();
    });

    window.addEventListener('load', () => setTimeout(playIntro, 400));
  </script>
